services:
  agent:
    build:
      context: .
      dockerfile: Dockerfile
    image: my-coding-agent-v5:latest
    container_name: my-coding-agent-v5
    user: agent  # Run as non-root user
    working_dir: /workspace
    volumes:
      # Mount output directory (read-write) for saving results
      - ./output:/output:rw
      # Mount current directory as read-only (code is read-only, agent can't modify)
      - .:/workspace:ro
      # Mount cached repositories (read-only) for faster access
      - ./cache/repos:/cache/repos:ro
    environment:
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - PYTHONUNBUFFERED=1
      - UV_PROJECT_ENVIRONMENT=/opt/venv  # Use pre-installed venv from image
      - XDG_CACHE_HOME=/tmp/.cache  # Use tmpfs for cache (uv, pip, etc.)
      - XDG_DATA_HOME=/tmp/.local/share  # Use tmpfs for data (uv Python interpreters)
      - XDG_CONFIG_HOME=/tmp/.config  # Use tmpfs for config files
      - UV_PYTHON=/usr/local/bin/python3
      - AGENT_WORKSPACE=/agent-workspace  # Agent's isolated working directory
    # Security: use tmpfs for temporary directories and .venv
    tmpfs:
      - /tmp:nosuid,size=2g  # Includes .venv and uv Python interpreters (noexec removed to allow execution)
      - /agent-workspace:nosuid,size=1g  # Agent's isolated working directory (writable, empty)
    # Note: read_only allows tmpfs writes but prevents writes to root filesystem
    read_only: true
    # Resource limits
    deploy:
      resources:
        limits:
          cpus: '4'
          memory: 8G
        reservations:
          cpus: '1'
          memory: 2G
    # Network isolation (optional, uncomment if needed)
    # network_mode: bridge
    stdin_open: true
    tty: true
